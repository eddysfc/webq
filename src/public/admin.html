<!doctype html>
<html lang="en">
  <head>
    <title>IRS WebQ — Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gray-100 min-h-screen">
    <header class="bg-[#1D4A71] text-white mb-12">
      <div class="relative flex items-center px-4 py-6 max-w-6xl mx-auto">
        <a
          class="flex items-center gap-3 hover:opacity-90 transition-opacity"
          href="/"
        >
          <img
            src="images/logo.png"
            alt="Club logo"
            class="h-12 w-auto"
            onerror="this.style.display = 'none'"
          />
          <h1 class="text-3xl font-bold tracking-tight">IRS UIUC</h1>
        </a>

        <a
          href="/admin.html"
          id="adminNavLink"
          class="ml-4 md:ml-12 text-white/80 hover:text-white font-medium transition-colors text-xl"
        >
          Admin
        </a>

        <div class="ml-auto relative" id="authArea"></div>
      </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 pb-12">
      <div id="app"></div>
    </main>

    <script>
      let pollInterval = null;

      async function loadAuth() {
        const res = await fetch("/auth/status");
        const data = await res.json();
        const authArea = document.getElementById("authArea");

        if (data.user) {
          authArea.innerHTML = `
            <button
              class="flex items-center gap-2 bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-lg font-medium text-base"
              onclick="this.parentElement.querySelector('.dropdown-menu').classList.toggle('hidden')"
            >
              <span>${data.user.username}</span>
              <svg class="w-4 h-4 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </button>
            <div class="dropdown-menu hidden absolute right-0 mt-1 w-40 bg-white rounded-lg shadow-lg border border-gray-100 overflow-hidden z-10">
              <a href="/auth/logout" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 transition-colors">Logout</a>
            </div>
          `;
          await checkAdmin();
        } else {
          authArea.innerHTML = `
            <a href="/auth/discord" class="bg-white/10 hover:bg-white/20 transition-colors px-4 py-2 rounded-lg font-medium text-base">
              Login with Discord
            </a>
          `;
          document.getElementById("app").innerHTML =
            `<p class="text-center text-gray-500 py-20">Please log in to access the admin panel.</p>`;
        }
      }

      document.addEventListener("click", (e) => {
        if (!e.target.closest("#authArea")) {
          document.querySelector(".dropdown-menu")?.classList.add("hidden");
        }
      });

      async function checkAdmin() {
        const res = await fetch("/api/admin/queues");
        if (res.status === 403 || res.status === 401) {
          document.getElementById("app").innerHTML =
            `<p class="text-center text-red-500 py-20">Access denied.</p>`;
          return;
        }
        startPolling();
      }

      function startPolling() {
        if (pollInterval) return;
        poll();
        pollInterval = setInterval(poll, 3000);
      }

      async function poll() {
        const res = await fetch("/api/admin/queues");
        if (!res.ok) return;
        const queues = await res.json();
        renderQueues(queues);
      }

      function renderQueues(queues) {
        document.getElementById("app").innerHTML = `
          <div class="flex items-center justify-between mb-6">
            <h2 class="text-xl font-bold text-gray-800">Admin Panel</h2>
          </div>

          <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 mb-8">
            <h3 class="font-semibold text-gray-700 mb-3">Create Queue</h3>
            <div class="flex gap-2">
              <input id="newQueueName" type="text" placeholder="Queue name"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1D4A71]/40" />
              <button onclick="createQueue()"
                class="bg-[#1D4A71] hover:bg-[#163a59] text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
                Create
              </button>
            </div>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            ${
              queues.length === 0
                ? `<p class="text-gray-400 col-span-3 text-center py-12">No queues yet.</p>`
                : queues.map(renderQueue).join("")
            }
          </div>
        `;
      }

      function renderQueue(q) {
        const memberRows =
          q.members.length === 0
            ? `<p class="text-gray-400 text-sm italic">Empty</p>`
            : q.members
                .map(
                  (m, i) => `
              <div class="flex items-center justify-between text-sm py-1 border-b border-gray-100 last:border-0">
                <div class="flex items-center gap-2 text-gray-700">
                  <span class="text-gray-400 w-4">${i + 1}.</span>
                  <span>${m.username}</span>
                  ${m.id.startsWith("walkin_") ? `<span class="text-xs text-gray-400 italic">walk-in</span>` : ""}
                </div>
                <button onclick="removeUser('${q.id}', '${m.id}')"
                  class="text-red-400 hover:text-red-600 text-xs font-medium transition-colors">
                  Remove
                </button>
              </div>
            `,
                )
                .join("");

        return `
          <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-5 flex flex-col gap-4">
            <div class="flex items-start justify-between">
              <h3 class="font-semibold text-gray-800">${q.name}</h3>
              <span class="text-xs font-medium bg-[#1D4A71]/10 text-[#1D4A71] px-2 py-1 rounded-full">${q.length} in line</span>
            </div>

            <div class="flex flex-col">${memberRows}</div>

            <div class="flex gap-2">
              <input id="walkin_name_${q.id}" type="text" placeholder="Walk-in name"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#1D4A71]/40" />
              <button onclick="addWalkin('${q.id}')"
                class="bg-[#1D4A71]/10 hover:bg-[#1D4A71]/20 text-[#1D4A71] text-sm font-medium px-3 py-2 rounded-lg transition-colors">
                Add
              </button>
            </div>

            <div class="flex gap-2">
              <button onclick="popFront('${q.id}')"
                class="flex-1 border border-gray-300 hover:bg-gray-50 text-gray-600 text-sm font-medium py-2 rounded-lg transition-colors">
                Pop Front
              </button>
              <button onclick="clearQueue('${q.id}')"
                class="flex-1 border border-orange-300 hover:bg-orange-50 text-orange-600 text-sm font-medium py-2 rounded-lg transition-colors">
                Clear
              </button>
              <button onclick="deleteQueue('${q.id}')"
                class="flex-1 border border-red-300 hover:bg-red-50 text-red-600 text-sm font-medium py-2 rounded-lg transition-colors">
                Delete
              </button>
            </div>
          </div>
        `;
      }

      async function createQueue() {
        const name = document.getElementById("newQueueName").value.trim();
        if (!name) return alert("Enter a queue name");
        await fetch("/api/admin/queues", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name }),
        });
        poll();
      }

      async function deleteQueue(queueId) {
        if (!confirm("Delete this queue?")) return;
        await fetch(`/api/admin/queues/${queueId}`, { method: "DELETE" });
        poll();
      }

      async function addWalkin(queueId) {
        const input = document.getElementById(`walkin_name_${queueId}`);
        const username = input.value.trim();
        if (!username) return alert("Enter a name");
        const res = await fetch(`/api/admin/queues/${queueId}/add`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username }),
        });
        const data = await res.json();
        if (!data.ok) alert(data.error);
        else input.value = "";
        poll();
      }

      async function removeUser(queueId, userId) {
        await fetch(`/api/admin/queues/${queueId}/remove/${userId}`, {
          method: "DELETE",
        });
        poll();
      }

      async function popFront(queueId) {
        await fetch(`/api/admin/queues/${queueId}/pop`, { method: "POST" });
        poll();
      }

      async function clearQueue(queueId) {
        if (!confirm("Clear all users from this queue?")) return;
        await fetch(`/api/admin/queues/${queueId}/clear`, { method: "POST" });
        poll();
      }

      loadAuth();
    </script>
  </body>
</html>
